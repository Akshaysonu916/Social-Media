{% if user.is_authenticated %}
<!-- 🤖 Chatbot Snippet -->
<div id="chatbot-box">
    <div id="chatbot-header">🤖 Chatbot Assistant</div>
    <div id="chatbot-log">
        <div id="bot-typing" class="hidden flex gap-1 items-center text-gray-500 mt-2 text-sm">
            <span>🤖 is typing</span>
            <div class="flex gap-1">
                <span class="dot w-2 h-2 bg-gray-400 rounded-full animate-bounce"></span>
                <span class="dot w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-150"></span>
                <span class="dot w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-300"></span>
            </div>
        </div>
    </div>
    <div id="chatbot-input-area">
        <input id="chatbot-input" type="text" placeholder="Ask me anything..." />
        <button id="chatbot-send">Send</button>
    </div>
</div>
<button id="chat-toggle-btn">💬</button>

<style>
    #chatbot-box {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 300px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        z-index: 1000;
        display: none;
        flex-direction: column;
        font-family: sans-serif;
    }
    #chatbot-header {
        background-color: #2563eb;
        color: white;
        padding: 10px;
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
        font-weight: bold;
    }
    #chatbot-log {
        padding: 10px;
        height: 200px;
        overflow-y: auto;
        font-size: 0.875rem;
        background: #f9fafb;
        color: #374151;
    }
    #chatbot-input-area {
        display: flex;
        border-top: 1px solid #ddd;
    }
    #chatbot-input {
        flex: 1;
        padding: 8px;
        border: none;
        outline: none;
    }
    #chatbot-send {
        background: #2563eb;
        color: white;
        padding: 8px 12px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        border-top-right-radius: 10px;
    }
    #chat-toggle-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1001;
        background-color: #2563eb;
        color: white;
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 22px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }
    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.8); opacity: 0.3; }
        40% { transform: scale(1.2); opacity: 1; }
    }
    .animate-bounce { animation: bounce 1.2s infinite ease-in-out; }
    .delay-150 { animation-delay: 0.15s; }
    .delay-300 { animation-delay: 0.3s; }
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const chatbotBox = document.getElementById("chatbot-box");
    const toggleBtn = document.getElementById("chat-toggle-btn");
    const input = document.getElementById('chatbot-input');
    const send = document.getElementById('chatbot-send');
    const log = document.getElementById('chatbot-log');
    const typingIndicator = document.getElementById('bot-typing');

    if (!toggleBtn || !chatbotBox) return;

    // Check if chat box was previously open
    if (localStorage.getItem("chatbotOpen") === "true") {
        chatbotBox.style.display = "flex";
        log.scrollTop = log.scrollHeight;
    }

    toggleBtn.addEventListener("click", function () {
        const isVisible = chatbotBox.style.display === "flex";
        chatbotBox.style.display = isVisible ? "none" : "flex";
        localStorage.setItem("chatbotOpen", !isVisible);
        if (!isVisible) {
            log.scrollTop = log.scrollHeight;
        }
    });

    function appendMessage(sender, text) {
        const entry = document.createElement('p');
        entry.style.margin = "5px 0";
        entry.style.padding = "5px";
        entry.style.borderRadius = "5px";
        if (sender === "You") {
            entry.style.backgroundColor = "#e0e7ff";
        } else {
            entry.style.backgroundColor = "#f3f4f6";
        }
        entry.innerHTML = `<strong>${sender}:</strong> ${text}`;
        
        if (typingIndicator) {
            log.insertBefore(entry, typingIndicator);
        } else {
            log.appendChild(entry);
        }
        log.scrollTop = log.scrollHeight;
    }

    // Load History
    console.log("Fetching chatbot history...");
    fetch('/api/chatbot/history/')
        .then(res => res.json())
        .then(data => {
            console.log("History data received:", data);
            if (data.history && data.history.length > 0) {
                data.history.forEach(msg => {
                    appendMessage(msg.sender, msg.text);
                });
                console.log("History loaded successfully.");
                // Scroll to bottom after loading history
                log.scrollTop = log.scrollHeight;
            } else {
                console.log("No history found or not logged in.");
            }
        })
        .catch(err => console.error("Error loading history:", err));

    function getCSRFToken() {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, 10) === 'csrftoken=') {
                    cookieValue = decodeURIComponent(cookie.substring(10));
                    break;
                }
            }
        }
        return cookieValue;
    }

    send.addEventListener('click', () => {
        const message = input.value.trim();
        if (!message) return;

        appendMessage("You", message);
        input.value = "";
        typingIndicator.classList.remove('hidden');

        fetch('/api/chatbot/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken(),
            },
            body: JSON.stringify({ message })
        })
        .then(res => res.json())
        .then(data => {
            typingIndicator.classList.add('hidden');
            appendMessage("Bot", data.reply || "Sorry, I didn't understand that.");
        })
        .catch(err => {
            typingIndicator.classList.add('hidden');
            appendMessage("Bot", "Error talking to chatbot.");
        });
    });

    input.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
            e.preventDefault();
            send.click();
        }
    });
});
</script>
{% endif %}
