<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ profile_user.username }}'s Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .fade-out {
            animation: fadeOut 0.5s ease forwards;
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        /* Highlight carousel modal */
        .modal-bg {
            background: rgba(0,0,0,0.8);
        }
        .carousel-item {
            display: none;
        }
        .carousel-item.active {
            display: block;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-4xl mx-auto py-8">

        <!-- Profile Info -->
        <div class="flex items-center space-x-6 mb-6">
            <img src="{{ profile_user.profile_picture.url }}" alt="Profile Picture" class="w-24 h-24 rounded-full object-cover border-2 border-primary-600">
            <div>
                <h2 class="text-2xl font-semibold">{{ profile_user.username }}</h2>
                <p class="text-gray-500">{{ profile_user.bio }}</p>
            </div>
        </div>

        <!-- -------------------------
             Story Highlights Section
             ------------------------- -->
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold">Highlights</h3>
            {% if request.user == profile_user %}
                <a href="{% url 'create_highlight' %}" class="text-primary-600 hover:underline flex items-center">
                    <i class="fas fa-plus-circle mr-1"></i> New Highlight
                </a>
            {% endif %}
        </div>

        <div class="flex space-x-4 overflow-x-auto py-2 mb-6">
            {% for highlight in profile_user.highlights.all %}
                <div class="flex flex-col items-center">
                    <button onclick="openHighlightModal({{ highlight.id }})" class="w-20 h-20 rounded-full overflow-hidden border-2 border-gray-300 relative focus:outline-none">
                        <img src="{{ highlight.get_cover }}" class="w-full h-full object-cover">
                    </button>
                    <span class="text-sm mt-1 truncate w-20 text-center">{{ highlight.name }}</span>
                </div>
            {% empty %}
                <p class="text-gray-400 text-sm">No highlights yet</p>
            {% endfor %}
        </div>

        <!-- Profile content / posts / feed -->
        <div>
            <!-- Add your profile posts or other content here -->
        </div>

    </div>

    <!-- -------------------------
         Highlight Viewer Modal
         ------------------------- -->
    <div id="highlightModal" class="fixed inset-0 hidden items-center justify-center modal-bg z-50">
        <div class="relative w-full max-w-md bg-black rounded-lg overflow-hidden">
            <button onclick="closeHighlightModal()" class="absolute top-2 right-2 text-white text-2xl z-50">&times;</button>
            <div id="carouselContainer" class="relative w-full h-96">
                <!-- Carousel items loaded via JS -->
            </div>
        </div>
    </div>

    <script>
        // ---------------------
        // Open Highlight Modal
        // ---------------------
        function openHighlightModal(highlightId) {
            fetch(`/highlights/view/${highlightId}/`)
                .then(response => response.text())
                .then(html => {
                    document.getElementById('carouselContainer').innerHTML = html;
                    document.getElementById('highlightModal').classList.remove('hidden');
                    initCarousel();
                });
        }

        function closeHighlightModal() {
            document.getElementById('highlightModal').classList.add('hidden');
            document.getElementById('carouselContainer').innerHTML = '';
        }

        // ---------------------
        // Carousel Logic
        // ---------------------
        let carouselIndex = 0;
        let carouselInterval;

        function initCarousel() {
            const items = document.querySelectorAll('#carouselContainer .carousel-item');
            if (!items.length) return;
            items.forEach(item => item.classList.remove('active'));
            items[0].classList.add('active');
            carouselIndex = 0;
            clearInterval(carouselInterval);
            carouselInterval = setInterval(() => {
                items[carouselIndex].classList.remove('active');
                carouselIndex = (carouselIndex + 1) % items.length;
                items[carouselIndex].classList.add('active');
            }, 5000);
        }
    </script>

</body>
</html>
